name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --name "GenerateChildAbsence" --hidden-import openpyxl --hidden-import xlrd generate_child_absence.py

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: GenerateChildAbsence
          path: dist/GenerateChildAbsence.exe